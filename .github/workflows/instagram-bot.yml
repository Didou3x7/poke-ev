name: PokeEV Instagram Bot

# Two phases per day, both pinned to Paris local time (DST-correct via a zoneinfo
# gate in the bot): in the MORNING (08:00-12:59 Paris) it rotates a theme, art-directs +
# price-verifies, sends the Telegram preview, and QUEUES it (pending-post.json). You have
# until 20:00 to reply "ok" to approve / reply notes to revise / "skip" to reject. At
# 20:00 Paris it publishes the CAROUSEL ONLY (never a story) and ONLY if approved
# (opt-in — nothing posts without your ok).

on:
  schedule:
    # Repo is PUBLIC, so frequent ticks are free → run EVERY 15 MIN (06:00-22:59 UTC ≈
    # 08:00-00:59 Paris both DST seasons). The Paris-time WINDOW gate in do_scheduled routes
    # each tick: MORNING 08-12:59 → prepare ONCE (idempotent) then poll button taps; AFTERNOON
    # 13-19:59 → poll (handle ✅/✏️/🚫 taps + replies, confirm); EVENING 20-23:59 → publish only
    # if approved (final/give-up tick at Paris ≥23:00). Frequent ticks make the inline buttons
    # feel responsive (a tap is answered + confirmed within ~one tick) without a webhook server.
    - cron: '*/15 6-22 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Manual run mode (test the preview or publish phase on demand)'
        type: choice
        default: scheduled
        options: [scheduled, prepare, poll, ack, publish-pending, evening, run, diagnose, set-webhook, setup-webhook, reel-test]
      set:
        description: 'Force a specific set for the RIP OR KEEP (T2) post, e.g. brilliant-stars (blank = auto)'
        type: string
        default: ''
      grail:
        description: 'Force a specific set for the GRAILS (T3) post — features that set''s top chase card (blank = auto)'
        type: string
        default: ''

permissions:
  contents: write

concurrency:
  group: ig-bot
  cancel-in-progress: false

jobs:
  run:
    if: github.event.inputs.mode != 'setup-webhook'
    runs-on: ubuntu-latest
    timeout-minutes: 175   # mode=evening waits up to 150 min for the 20:00 Paris window (a 17:00 UTC cron can land at 18:00 Paris in winter), + setup/publish overhead
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      # Cache the Reel toolchain (Remotion deps + its downloaded headless browser, which lives
      # under node_modules/.remotion). The bot installs these lazily ONLY when a Reel is actually
      # rendered (main.py _ensure_reel_deps), so normal cron ticks stay fast; the cache makes that
      # first render quick too. Keyed on the reel lockfile so a dep bump busts it.
      - name: Cache reel toolchain (Remotion + browser)
        uses: actions/cache@v4
        with:
          path: instagram-bot/reel/node_modules
          key: reel-${{ runner.os }}-${{ hashFiles('instagram-bot/reel/package-lock.json') }}
      - run: pip install -r instagram-bot/requirements.txt
      - run: npm install --no-save @vercel/blob   # tiny Blob uploader for HD card art
        working-directory: instagram-bot
      - name: Scheduled — morning Paris preview / 20:00 Paris publish (carousel only)
        working-directory: instagram-bot
        env:
          ANTHROPIC_API_KEY:     ${{ secrets.ANTHROPIC_API_KEY }}
          POKEMONTCG_API_KEY:    ${{ secrets.POKEMONTCG_API_KEY }}
          REPLICATE_API_TOKEN:   ${{ secrets.REPLICATE_API_TOKEN }}
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
          META_ACCESS_TOKEN:     ${{ secrets.META_ACCESS_TOKEN }}
          INSTAGRAM_BUSINESS_ID: ${{ secrets.INSTAGRAM_BUSINESS_ID }}
          META_GRAPH_VERSION:    v21.0
          TELEGRAM_BOT_TOKEN:    ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:      ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_WEBHOOK_SECRET: ${{ secrets.TELEGRAM_WEBHOOK_SECRET }}
          POKEEV_RK_SET:         ${{ github.event.inputs.set }}
          POKEEV_GRAIL_SET:      ${{ github.event.inputs.grail }}
          POKEEV_DATA_DIR:       ${{ github.workspace }}/data
          POKEEV_IMAGE_BASE_URL: https://pokeev.com
          TOP_N_CARDS:           '5'
          APPROVAL_TIMEOUT:      '2700'   # one-shot `run` mode: 45 min to approve on Telegram
          REVISE_TIMEOUT:        '1500'   # 25 min at 20:00 to finalize a last-minute revise
          PLAN_PATH:             plan.json
          HISTORY_PATH:          history.json
          PENDING_PATH:          pending-post.json
        run: python main.py ${{ github.event.inputs.mode || 'scheduled' }}
      - name: Record post history
        if: always()
        run: |
          git config user.name "Didou3x7"
          git config user.email "292510557+Didou3x7@users.noreply.github.com"
          # Stage each file SEPARATELY and tolerantly: a single `git add` listing a
          # not-yet-existing path (history.json on a fresh run) is FATAL and stages
          # NOTHING — so pending-post.json was never committed and the 20:00 publish
          # found no queued post (the 2-phase flow silently never worked). Then retry
          # the push past any race with a concurrent commit.
          git add instagram-bot/pending-post.json 2>/dev/null || true
          git add instagram-bot/history.json 2>/dev/null || true
          git add instagram-bot/style-notes.md 2>/dev/null || true
          if ! git diff --staged --quiet; then
            git commit -m "chore(bot): post history + pending state [skip ci]"
            for i in 1 2 3 4 5; do
              git pull --rebase --autostash origin main && git push && break
              echo "push attempt $i raced — retrying"; sleep 5
            done
          fi

  # One-off setup (run manually with mode=setup-webhook): copy the bot's GitHub secrets into
  # the Vercel project env so the /api/tg webhook can read them, redeploy so they take effect,
  # then register the Telegram webhook. After this, taps are handled INSTANTLY on Telegram.
  setup-webhook:
    if: github.event.inputs.mode == 'setup-webhook'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r instagram-bot/requirements.txt
      - name: Copy secrets into Vercel env + redeploy
        env:
          VERCEL_TOKEN:            ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID:           ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID:       ${{ secrets.VERCEL_PROJECT_ID }}
          TELEGRAM_BOT_TOKEN:      ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:        ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_WEBHOOK_SECRET: ${{ secrets.TELEGRAM_WEBHOOK_SECRET }}
          META_ACCESS_TOKEN:       ${{ secrets.META_ACCESS_TOKEN }}
          INSTAGRAM_BUSINESS_ID:   ${{ secrets.INSTAGRAM_BUSINESS_ID }}
          BLOB_READ_WRITE_TOKEN:   ${{ secrets.BLOB_READ_WRITE_TOKEN }}
          GH_DISPATCH_TOKEN:       ${{ secrets.GH_DISPATCH_TOKEN }}
          CRON_SECRET:             ${{ secrets.CRON_SECRET }}
          META_GRAPH_VERSION:      v21.0
        run: |
          npm i -g vercel@54.14.0
          vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          setenv() {
            local name="$1"; local val="${!name}"
            if [ -z "$val" ]; then echo "skip $name (empty)"; return; fi
            vercel env rm "$name" production --yes --token="$VERCEL_TOKEN" >/dev/null 2>&1 || true
            printf '%s' "$val" | vercel env add "$name" production --token="$VERCEL_TOKEN" >/dev/null
            echo "set $name in Vercel env"
          }
          setenv TELEGRAM_BOT_TOKEN
          setenv TELEGRAM_CHAT_ID
          setenv TELEGRAM_WEBHOOK_SECRET
          setenv META_ACCESS_TOKEN
          setenv INSTAGRAM_BUSINESS_ID
          setenv BLOB_READ_WRITE_TOKEN
          setenv GH_DISPATCH_TOKEN
          setenv CRON_SECRET
          setenv META_GRAPH_VERSION
          echo "redeploying so the new runtime env vars are picked up..."
          vercel build --prod --token="$VERCEL_TOKEN"
          vercel deploy --prebuilt --prod --archive=tgz --token="$VERCEL_TOKEN"
      - name: Register Telegram webhook
        working-directory: instagram-bot
        env:
          TELEGRAM_BOT_TOKEN:      ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_WEBHOOK_SECRET: ${{ secrets.TELEGRAM_WEBHOOK_SECRET }}
          POKEEV_IMAGE_BASE_URL:   https://pokeev.com
        run: python main.py set-webhook
