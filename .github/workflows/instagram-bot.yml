name: PokeEV Instagram Bot

# Two phases per day, both pinned to Paris local time (DST-correct via a zoneinfo
# gate in the bot): in the MORNING (08:00-12:59 Paris) it rotates a theme, art-directs +
# price-verifies, sends the Telegram preview, and QUEUES it (pending-post.json). You have
# until 20:00 to reply "ok" to approve / reply notes to revise / "skip" to reject. At
# 20:00 Paris it publishes the CAROUSEL ONLY (never a story) and ONLY if approved
# (opt-in — nothing posts without your ok).

on:
  schedule:
    # Repo is PUBLIC, so frequent ticks are free → run EVERY 15 MIN (06:00-22:59 UTC ≈
    # 08:00-00:59 Paris both DST seasons). The Paris-time WINDOW gate in do_scheduled routes
    # each tick: MORNING 08-12:59 → prepare ONCE (idempotent) then poll button taps; AFTERNOON
    # 13-19:59 → poll (handle ✅/✏️/🚫 taps + replies, confirm); EVENING 20-23:59 → publish only
    # if approved (final/give-up tick at Paris ≥23:00). Frequent ticks make the inline buttons
    # feel responsive (a tap is answered + confirmed within ~one tick) without a webhook server.
    - cron: '*/15 6-22 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Manual run mode (test the preview or publish phase on demand)'
        type: choice
        default: scheduled
        options: [scheduled, prepare, poll, ack, publish-pending, run, diagnose]
      set:
        description: 'Force a specific set for the RIP OR KEEP (T2) post, e.g. brilliant-stars (blank = auto)'
        type: string
        default: ''

permissions:
  contents: write

concurrency:
  group: ig-bot
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 60   # room for the Telegram approve/revise loop
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: pip install -r instagram-bot/requirements.txt
      - run: npm install --no-save @vercel/blob   # tiny Blob uploader for HD card art
        working-directory: instagram-bot
      - name: Scheduled — morning Paris preview / 20:00 Paris publish (carousel only)
        working-directory: instagram-bot
        env:
          ANTHROPIC_API_KEY:     ${{ secrets.ANTHROPIC_API_KEY }}
          POKEMONTCG_API_KEY:    ${{ secrets.POKEMONTCG_API_KEY }}
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
          META_ACCESS_TOKEN:     ${{ secrets.META_ACCESS_TOKEN }}
          INSTAGRAM_BUSINESS_ID: ${{ secrets.INSTAGRAM_BUSINESS_ID }}
          META_GRAPH_VERSION:    v21.0
          TELEGRAM_BOT_TOKEN:    ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:      ${{ secrets.TELEGRAM_CHAT_ID }}
          POKEEV_RK_SET:         ${{ github.event.inputs.set }}
          POKEEV_DATA_DIR:       ${{ github.workspace }}/data
          POKEEV_IMAGE_BASE_URL: https://pokeev.com
          TOP_N_CARDS:           '5'
          APPROVAL_TIMEOUT:      '2700'   # one-shot `run` mode: 45 min to approve on Telegram
          REVISE_TIMEOUT:        '1500'   # 25 min at 20:00 to finalize a last-minute revise
          PLAN_PATH:             plan.json
          HISTORY_PATH:          history.json
          PENDING_PATH:          pending-post.json
        run: python main.py ${{ github.event.inputs.mode || 'scheduled' }}
      - name: Record post history
        if: always()
        run: |
          git config user.name "Didou3x7"
          git config user.email "292510557+Didou3x7@users.noreply.github.com"
          # Stage each file SEPARATELY and tolerantly: a single `git add` listing a
          # not-yet-existing path (history.json on a fresh run) is FATAL and stages
          # NOTHING — so pending-post.json was never committed and the 20:00 publish
          # found no queued post (the 2-phase flow silently never worked). Then retry
          # the push past any race with a concurrent commit.
          git add instagram-bot/pending-post.json 2>/dev/null || true
          git add instagram-bot/history.json 2>/dev/null || true
          git add instagram-bot/style-notes.md 2>/dev/null || true
          if ! git diff --staged --quiet; then
            git commit -m "chore(bot): post history + pending state [skip ci]"
            for i in 1 2 3 4 5; do
              git pull --rebase --autostash origin main && git push && break
              echo "push attempt $i raced — retrying"; sleep 5
            done
          fi
