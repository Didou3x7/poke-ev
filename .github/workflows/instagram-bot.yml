name: PokeEV Instagram Bot

# One run does it all: rotate a theme, let Claude art-direct, cross-check every
# price against live pokemontcg.io, send the preview to Telegram with Approve/
# Reject buttons, and publish the carousel + story ONLY after you tap Approve.
# Until TELEGRAM_BOT_TOKEN/TELEGRAM_CHAT_ID secrets exist, it previews only.

on:
  schedule:
    - cron: '0 17 * * *'   # 17:00 UTC = 19:00 Paris / ~1pm ET
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ig-bot
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r instagram-bot/requirements.txt
      - name: Plan → Telegram gate → publish
        working-directory: instagram-bot
        env:
          ANTHROPIC_API_KEY:     ${{ secrets.ANTHROPIC_API_KEY }}
          POKEMONTCG_API_KEY:    ${{ secrets.POKEMONTCG_API_KEY }}
          REPLICATE_API_TOKEN:   ${{ secrets.REPLICATE_API_TOKEN }}
          META_ACCESS_TOKEN:     ${{ secrets.META_ACCESS_TOKEN }}
          INSTAGRAM_BUSINESS_ID: ${{ secrets.INSTAGRAM_BUSINESS_ID }}
          META_GRAPH_VERSION:    v21.0
          TELEGRAM_BOT_TOKEN:    ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:      ${{ secrets.TELEGRAM_CHAT_ID }}
          POKEEV_DATA_DIR:       ${{ github.workspace }}/data
          POKEEV_IMAGE_BASE_URL: https://pokeev.com
          TOP_N_CARDS:           '5'
          APPROVAL_TIMEOUT:      '1200'
          PLAN_PATH:             plan.json
          HISTORY_PATH:          history.json
        run: python main.py run
      - name: Record post history
        if: always()
        run: |
          git config user.name "Didou3x7"
          git config user.email "292510557+Didou3x7@users.noreply.github.com"
          git add instagram-bot/history.json 2>/dev/null || true
          if ! git diff --staged --quiet; then
            git commit -m "chore(bot): record IG post history [skip ci]"
            git push
          fi
