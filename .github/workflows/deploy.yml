name: Deploy & daily price refresh

# Single deploy path: this Action runs `vercel deploy` (token auth). On every
# push it deploys; once a day it also refreshes the price snapshot (free TCGdex
# + TCGCSV), commits it, and redeploys. Commits are authored as the repo owner
# (valid email) so Vercel can attribute the deployment. No manual step, ever.
# Repo secrets: VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID.

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 5 * * *" # every day 05:00 UTC (TCGCSV publishes ~20:00 UTC)
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: deploy-main
  cancel-in-progress: false

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Discover new sets + refresh prices (scheduled runs only)
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          npm run discover || echo "discover step soft-failed — continuing with price refresh"
          # Fail-safe: if discovery wrote anything the schema rejects, revert the
          # catalog/map (a bad era-file would otherwise drop a whole era) but keep
          # the price refresh going.
          if ! npm run validate:data; then
            echo "::warning::discovered catalog data invalid — reverting catalog changes, keeping price refresh"
            git checkout -- data/sets data/sources/tcgdex-sets.json
          fi
          npm run snapshot
          git config user.name "Didou3x7"
          git config user.email "292510557+Didou3x7@users.noreply.github.com"
          git add data/snapshot/snapshot.json data/sets data/sources/tcgdex-sets.json
          if git diff --staged --quiet; then
            echo "No data changes today."
          else
            git commit -m "chore: daily refresh (new sets + TCGdex/TCGCSV prices)"
            git push
          fi

      - name: Deploy to Vercel (production)
        run: |
          npm i -g vercel@latest
          vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          vercel build --prod --token="$VERCEL_TOKEN"
          vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
