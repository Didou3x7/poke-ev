name: Daily price refresh

# Once a day, regenerate the price snapshot (free TCGdex + TCGCSV) and commit it.
# Vercel's Git integration auto-deploys the resulting commit — and every code
# push — so deployment has a single source of truth (no token, no redundancy).
# Commits are authored as the repo owner so Vercel can attribute & deploy them.

on:
  schedule:
    - cron: "0 5 * * *" # every day 05:00 UTC (TCGCSV publishes ~20:00 UTC)
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Refresh prices and commit
        run: |
          npm run snapshot
          git config user.name "Didou3x7"
          git config user.email "292510557+Didou3x7@users.noreply.github.com"
          git add data/snapshot/snapshot.json
          if git diff --staged --quiet; then
            echo "No price changes today."
          else
            git commit -m "chore: daily price refresh (TCGdex + TCGCSV)"
            git push
          fi
