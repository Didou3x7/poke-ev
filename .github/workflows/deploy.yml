name: Deploy & daily price refresh

# Deploys to Vercel on every push to main, AND once a day refreshes the price
# snapshot (free TCGdex + TCGCSV) → commits it → redeploys. Fully automatic:
# no manual step ever. Needs repo secrets: VERCEL_TOKEN, VERCEL_ORG_ID,
# VERCEL_PROJECT_ID.

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 5 * * *" # every day 05:00 UTC (TCGCSV publishes ~20:00 UTC)
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # On the daily/manual run, regenerate the price snapshot and commit it.
      - name: Refresh prices (scheduled runs only)
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          npm run snapshot
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/snapshot/snapshot.json
          if git diff --staged --quiet; then
            echo "No price changes today."
          else
            git commit -m "chore: daily price refresh (TCGdex + TCGCSV)"
            git push
          fi

      - name: Deploy to Vercel (production)
        run: |
          npm i -g vercel@latest
          vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          vercel build --prod --token="$VERCEL_TOKEN"
          vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
